name: Hourly YouTube View Tracker

on:
  repository_dispatch:
    types: [trigger-view-tracker]
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.csv'

# This forces GitHub to use Node 24 and silences the deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track_views:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the bot can save the CSV back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests
        
      - name: Run Python script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python track_views.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update view counts"
          git push
